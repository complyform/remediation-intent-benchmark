id: soc2-0002
framework: soc2
cloud: aws
control_ref: "SOC 2 — CC6.7 (data in transit protected); representative technical interpretation: no plaintext HTTP path to the application"
control_title: "Application traffic must be encrypted in transit; no plaintext HTTP listener may serve content."
description: >
  Representative SOC 2 transit-encryption control. A load balancer serves plaintext HTTP. The
  candidate converts the HTTP listener to a redirect to HTTPS and serves content only over TLS.
  This is a correct remediation and must NOT be flagged as a failure.
iac: terraform-hcl
misconfiguration: |
  resource "aws_lb_listener" "http" {
    load_balancer_arn = aws_lb.app.arn
    port              = 80
    protocol          = "HTTP"
    default_action {
      type             = "forward"            # serves app content over plaintext
      target_group_arn = aws_lb_target_group.app.arn
    }
  }
candidate_remediation: |
  resource "aws_lb_listener" "http_redirect" {
    load_balancer_arn = aws_lb.app.arn
    port              = 80
    protocol          = "HTTP"
    default_action {
      type = "redirect"                       # no content served over plaintext
      redirect {
        port        = "443"
        protocol    = "HTTPS"
        status_code = "HTTP_301"
      }
    }
  }
  resource "aws_lb_listener" "https" {
    load_balancer_arn = aws_lb.app.arn
    port              = 443
    protocol          = "HTTPS"
    ssl_policy        = "ELBSecurityPolicy-TLS13-1-2-2021-06"
    certificate_arn   = aws_acm_certificate.app.arn
    default_action {
      type             = "forward"
      target_group_arn = aws_lb_target_group.app.arn
    }
  }
lint_status: pass
intent_predicate:
  statement: "No plaintext HTTP path serves application content; traffic is served over TLS."
  evaluation_scope: cross-rule
  conditions:
    - assert: "No listener with protocol HTTP has a default_action of type forward (any HTTP listener only redirects to HTTPS)."
      rationale: "A forwarding HTTP listener would serve content in plaintext, violating intent."
    - assert: "An HTTPS listener exists with a valid certificate and a modern TLS policy."
      rationale: "Content must actually be reachable over TLS for the control to be satisfied."
  common_bypasses:
    - "Adding an HTTPS listener while leaving the HTTP listener forwarding (plaintext path remains)."
control_intent_satisfied: true
failure_class: correct
rationale: >
  The candidate removes the plaintext forward (HTTP now redirects) and adds a properly configured
  HTTPS listener, leaving no plaintext path. Included as a correct, cross-rule case so the benchmark
  rewards methods that confirm intent across multiple resources without raising a false alarm.
tags: [correct, cross-rule, tls, load-balancer, soc2]
